name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  rust-and-frontend:
    name: Rust + Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Clippy check
        run: bun run clippy

      - name: Run Rust tests
        run: bun run test

      - name: Wasm target check
        run: bun run check:wasm

      - name: Frontend tests
        run: bun run frontend:test

      - name: Frontend production build
        run: bun run frontend:build

  tauri-desktop:
    name: Tauri desktop smoke build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
          key: tauri-${{ matrix.os }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      - name: Build frontend (consumed by Tauri)
        run: bun run frontend:build

      - name: Build Tauri desktop binary
        run: cargo build -p memory-pak-tauri --bin memory-pak --release
