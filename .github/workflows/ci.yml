name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: rust-test
      - run: cargo test --workspace

  wasm-check:
    name: Wasm target check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-check
      - run: cargo check -p memory_pak_wasm --target wasm32-unknown-unknown

  frontend-build:
    name: Frontend build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: frontend
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Type check + unit tests
        run: bun run frontend:test
      - name: Production build
        run: bun run frontend:build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/bun.lock', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium
      - name: Run e2e tests
        run: bun run frontend:e2e

  tauri-desktop:
    name: Tauri desktop smoke build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.os }}
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Build frontend (consumed by Tauri)
        run: bun run frontend:build
      - name: Build Tauri desktop binary
        run: cargo build -p memory-pak-tauri --bin memory-pak --release
