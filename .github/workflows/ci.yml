name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.13"
  RUST_VERSION: "1.94.0"
  WASM_PACK_VERSION: "0.14.0"
  TAURI_CLI_VERSION: "2.11.1"

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt,clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo check -p memory_pak_wasm --target wasm32-unknown-unknown

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: frontend
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: ${{ env.WASM_PACK_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --cwd frontend --frozen-lockfile
      - run: bun run frontend:test
      - run: bun run frontend:check
      - run: bun run frontend:build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: ${{ env.WASM_PACK_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --cwd frontend --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/bun.lock', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium
      - run: bun run frontend:e2e

  desktop-smoke:
    name: Desktop smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runs-on: windows-latest
          - platform: macos
            runs-on: macos-latest
          - platform: linux
            runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-smoke-${{ matrix.platform }}
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: ${{ env.WASM_PACK_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --cwd frontend --frozen-lockfile
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ${{ env.TAURI_CLI_VERSION }} --locked
      - run: cargo tauri build --no-bundle --ci

  android-smoke:
    name: Android smoke
    runs-on: ubuntu-latest
    if: vars.ENABLE_ANDROID_CI == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-smoke
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: ${{ env.WASM_PACK_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --cwd frontend --frozen-lockfile
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ${{ env.TAURI_CLI_VERSION }} --locked
      - run: cargo tauri android build --debug
