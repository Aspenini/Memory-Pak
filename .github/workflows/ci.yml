name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

# contents: read — checkout and clone
# actions: write — actions/upload-artifact (bundles)
permissions:
  contents: read
  actions: write

jobs:
  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: rust-test
      - run: cargo test --workspace

  wasm-check:
    name: Wasm target check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-check
      - run: cargo check -p memory_pak_wasm --target wasm32-unknown-unknown

  frontend-build:
    name: Frontend build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: frontend
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Type check + unit tests
        run: bun run frontend:test
      - name: Production build
        run: bun run frontend:build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/bun.lock', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium
      - name: Run e2e tests
        run: bun run frontend:e2e

  tauri-desktop:
    name: Tauri desktop smoke build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.os }}
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile
      - name: Build frontend (consumed by Tauri)
        run: bun run frontend:build
      - name: Build Tauri desktop binary
        run: cargo build -p memory-pak-tauri --bin memory-pak --release

  # Single anchor for downstream jobs. Packaging runs only after every validation job succeeds.
  ci-ok:
    name: CI passed (gate)
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - rust-test
      - wasm-check
      - frontend-build
      - e2e
      - tauri-desktop
    steps:
      - run: echo "All validation jobs succeeded"

  # Runs on every push/PR once validation is green. To save runner minutes, add:
  # if: github.ref == 'refs/heads/master' && github.event_name == 'push'
  # (or tags-only) to this job.
  package:
    name: Package (${{ matrix.platform }})
    needs: [ci-ok]
    # Fork PRs cannot upload artifacts with the default token; validation still runs upstream.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runs-on: windows-latest
            bundles: "nsis,msi"
          - platform: macos
            runs-on: macos-latest
            bundles: "dmg"
          - platform: linux
            runs-on: ubuntu-22.04
            bundles: "appimage,deb"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            squashfs-tools \
            desktop-file-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: package-${{ matrix.platform }}

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri bundles
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      # Cargo workspace: release output lives at repo root `target/`, not `src-tauri/target/`.
      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $release = Join-Path $env:GITHUB_WORKSPACE "target/release"
          $out = Join-Path $env:GITHUB_WORKSPACE "Memory-Pak-windows-portable.zip"
          $exe = Join-Path $release "memory-pak.exe"
          if (-not (Test-Path $exe)) { throw "memory-pak.exe not found at $exe" }
          $paths = @($exe)
          Get-ChildItem -Path $release -Filter *.dll -File | ForEach-Object { $paths += $_.FullName }
          if ($paths.Count -lt 1) { throw "No files to archive" }
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path $paths -DestinationPath $out

      - name: Upload Windows bundles
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: memory-pak-windows
          path: |
            target/release/bundle/nsis/**
            target/release/bundle/msi/**
            Memory-Pak-windows-portable.zip

      - name: Upload macOS bundles
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: memory-pak-macos
          path: target/release/bundle/dmg/**

      - name: Upload Linux bundles
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: memory-pak-linux
          path: |
            target/release/bundle/appimage/**
            target/release/bundle/deb/**
