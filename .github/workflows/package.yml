name: Package Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to place in latest.json"
        required: true
        default: "0.3.0"
      tag:
        description: "GitHub release tag that artifacts will be attached to manually"
        required: true
        default: "v0.3.0"

permissions:
  contents: read
  actions: write

env:
  BUN_VERSION: "1.3.13"
  RUST_VERSION: "1.94.0"
  WASM_PACK_VERSION: "0.14.0"
  TAURI_CLI_VERSION: "2.11.1"
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runs-on: windows-latest
            bundles: nsis,msi
            extra-args: ""
          - platform: macos
            runs-on: macos-latest
            bundles: dmg
            extra-args: "--target universal-apple-darwin"
          - platform: linux
            runs-on: ubuntu-22.04
            bundles: appimage,deb
            extra-args: ""
    steps:
      - uses: actions/checkout@v5

      - name: Validate updater secrets
        shell: bash
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "TAURI_SIGNING_PRIVATE_KEY is required"; exit 1; }
          test -n "$TAURI_UPDATER_PUBKEY" || { echo "TAURI_UPDATER_PUBKEY is required"; exit 1; }

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            squashfs-tools \
            desktop-file-utils

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown' || 'wasm32-unknown-unknown' }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: package-${{ matrix.platform }}

      - uses: ./.github/actions/setup-wasm-pack
        with:
          version: ${{ env.WASM_PACK_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --cwd frontend --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ${{ env.TAURI_CLI_VERSION }} --locked

      - name: Write updater config overlay
        run: node scripts/write-tauri-updater-config.mjs target/tauri-updater.conf.json

      - name: Build Tauri bundles
        run: cargo tauri build --bundles ${{ matrix.bundles }} --config target/tauri-updater.conf.json ${{ matrix.extra-args }}

      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $release = Join-Path $env:GITHUB_WORKSPACE "target/release"
          $out = Join-Path $env:GITHUB_WORKSPACE "Memory-Pak-windows-portable.zip"
          $exe = Join-Path $release "memory-pak.exe"
          if (-not (Test-Path $exe)) { throw "memory-pak.exe not found at $exe" }
          $paths = @($exe)
          Get-ChildItem -Path $release -Filter *.dll -File | ForEach-Object { $paths += $_.FullName }
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path $paths -DestinationPath $out

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: memory-pak-${{ matrix.platform }}
          path: |
            target/**/release/bundle/**
            Memory-Pak-windows-portable.zip
          if-no-files-found: error

  release-metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: release-staging
          merge-multiple: true
      - name: Generate latest.json and checksums
        run: |
          node scripts/stage-release-artifacts.mjs \
            --version "${{ inputs.version }}" \
            --tag "${{ inputs.tag }}" \
            --input release-staging \
            --output release-metadata
      - uses: actions/upload-artifact@v5
        with:
          name: memory-pak-release-metadata
          path: release-metadata/**
          if-no-files-found: error
